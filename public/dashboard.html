<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Dashboard</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
    <div class="servers-page" id="servers-page">
        <header class="topbar">
        <div class="left-section" id="welcome">Welcome , to Ultimate CAD</div>
            <div class="center-section">
                <button onclick="openCreateServerPopup()">Create Server</button>
            </div>
            <div class="right-section">
                <button onclick="refresh()">Settings</button>
                <button onclick="logOut()">Log out</button>
            </div>
        </header>

        <main class="dashboard">
            <div class="serverslist">
                <!-- Server list displayed in a table -->
                <table id="server-table" class="server-table">
                    <thead>
                        <tr>
                            <th>Server ID</th>
                            <th>Server Name</th>
                        </tr>
                    </thead>
                    <tbody id="server-list">
                        <!-- Server entries will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>
        </main>

        <div class="popup hidden" id="join-popup">
            <div class="popup-content">
                <span class="close" onclick="closeJoinPopup()">&times;</span>
                <h2>Enter Join Code</h2>
                <form>
                    <input type="text" id="join-code" placeholder="Join Code" required />
                    <button type="submit" id="join-button" onclick="serverJoin()">Join Server</button>
                </form>
            </div>
        </div>
    </div>

    <div class="popup hidden" id="create-server-popup">
        <div class="popup-content">
            <span class="close" onclick="closeCreateServerPopup()">&times;</span>
            <h2>Create Server</h2>

            <label>Server Name *</label>
            <input type="text" id="cs-name" placeholder="My CAD Server" required />

            <label>Description</label>
            <input type="text" id="cs-description" placeholder="A short description..." />

            <label>Icon URL</label>
            <input type="text" id="cs-icon" placeholder="https://..." />

            <label>Join Code (leave blank to auto-generate)</label>
            <input type="text" id="cs-joincode" placeholder="e.g. ABC12345" />

            <hr style="border-color:#444; margin: 12px 0;" />
            <label>Link Discord Server</label>

            <div style="display:flex; gap:8px; margin-bottom:8px;">
            <button onclick="setDiscordMode('pick')" id="mode-pick">Pick from my guilds</button>
            <button onclick="setDiscordMode('manual')" id="mode-manual">Enter ID manually</button>
            </div>

            <div id="discord-pick-section">
            <select id="cs-guild-select">
                <option value="">— Select a Discord server —</option>
            </select>
            </div>

            <div id="discord-manual-section" class="hidden">
            <input type="text" id="cs-discord-id" placeholder="Discord Server ID" />
            </div>

            <br/>
            <button onclick="submitCreateServer()">Create Server</button>
            <div id="cs-error" style="color:red; margin-top:8px;"></div>
        </div>
    </div>

    <script src="scripts/script.js">
        window.onload = async () => {
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'index.html';
            return;
        }
        checkLoginStatus();
        };
    </script>
</body>
</html>
